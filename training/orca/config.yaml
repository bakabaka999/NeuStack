env:
  type: "simple"  # "simple" 或 "multi_flow"
  bandwidth_mbps: 100
  base_rtt_ms: 20
  buffer_size_packets: 100
  episode_steps: 200
  bandwidth_variation: true
  num_flows: 2  # 仅 multi_flow 使用

agent:
  state_dim: 7
  action_dim: 1
  hidden_dims: [256, 256]
  lr_actor: 0.0001
  lr_critic: 0.001
  gamma: 0.99
  tau: 0.005
  buffer_size: 100000
  batch_size: 256

training:
  num_episodes: 1000
  max_steps_per_episode: 200
  warmup_steps: 1000
  eval_interval: 50
  save_interval: 100
  noise_decay: 0.995
  min_noise: 0.1

output:
  model_dir: "checkpoints"
  onnx_path: "../../models/orca_actor.onnx"