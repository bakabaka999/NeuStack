name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          # Linux: full matrix (Release/Debug × AI ON/OFF)
          - os: ubuntu-latest
            build_type: Release
            ai_enabled: ON
            af_xdp: OFF
            tls_enabled: OFF
          - os: ubuntu-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: OFF
          - os: ubuntu-latest
            build_type: Debug
            ai_enabled: ON
            af_xdp: OFF
            tls_enabled: OFF
          - os: ubuntu-latest
            build_type: Debug
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: OFF
          # Linux: AF_XDP (Release, AI ON/OFF)
          - os: ubuntu-latest
            build_type: Release
            ai_enabled: ON
            af_xdp: ON
            tls_enabled: OFF
          - os: ubuntu-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: ON
            tls_enabled: OFF
          # Linux: TLS (Release, AI OFF)
          - os: ubuntu-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: ON
          # macOS: Release only (with and without AI)
          - os: macos-latest
            build_type: Release
            ai_enabled: ON
            af_xdp: OFF
            tls_enabled: OFF
          - os: macos-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: OFF
          # macOS: TLS (Release, AI OFF)
          - os: macos-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: ON
          # Windows: Release (with and without AI)
          - os: windows-latest
            build_type: Release
            ai_enabled: ON
            af_xdp: OFF
            tls_enabled: OFF
          - os: windows-latest
            build_type: Release
            ai_enabled: OFF
            af_xdp: OFF
            tls_enabled: OFF

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ─── Linux dependencies ───
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build
          # AF_XDP dependencies (clang for BPF compilation, libbpf for loading)
          if [ "${{ matrix.af_xdp }}" = "ON" ]; then
            sudo apt-get install -y clang libbpf-dev libelf-dev zlib1g-dev pkg-config
            # BPF cross-compilation needs asm/types.h symlink
            if [ ! -e /usr/include/asm ]; then
              sudo ln -s /usr/include/x86_64-linux-gnu/asm /usr/include/asm
            fi
          fi

      # ─── macOS dependencies ───
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      # ─── Windows dependencies ───
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # ─── Catch2 (all platforms) ───
      - name: Install Catch2 v3
        run: |
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git ${{ runner.temp }}/catch2
          cmake -B ${{ runner.temp }}/catch2/build -S ${{ runner.temp }}/catch2 -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build ${{ runner.temp }}/catch2/build
          sudo cmake --install ${{ runner.temp }}/catch2/build
        if: runner.os != 'Windows'

      - name: Install Catch2 v3 (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git ${{ runner.temp }}/catch2
          cmake -B ${{ runner.temp }}/catch2/build -S ${{ runner.temp }}/catch2 -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build ${{ runner.temp }}/catch2/build
          cmake --install ${{ runner.temp }}/catch2/build --prefix "${{ runner.temp }}/catch2-install"

      # ─── ONNX Runtime (Linux/macOS, when AI=ON) ───
      - name: Install ONNX Runtime (Linux)
        if: matrix.ai_enabled == 'ON' && runner.os == 'Linux'
        run: |
          ONNX_VERSION=1.17.0
          curl -sL https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/onnxruntime-linux-x64-${ONNX_VERSION}.tgz | tar xz -C /tmp
          echo "ONNXRUNTIME_ROOT=/tmp/onnxruntime-linux-x64-${ONNX_VERSION}" >> $GITHUB_ENV

      - name: Install ONNX Runtime (macOS)
        if: matrix.ai_enabled == 'ON' && runner.os == 'macOS'
        run: |
          ONNX_VERSION=1.17.0
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            ORT_NAME="onnxruntime-osx-arm64-${ONNX_VERSION}"
          else
            ORT_NAME="onnxruntime-osx-x86_64-${ONNX_VERSION}"
          fi
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/${ORT_NAME}.tgz" | tar xz -C /tmp
          echo "ONNXRUNTIME_ROOT=/tmp/${ORT_NAME}" >> $GITHUB_ENV

      - name: Install ONNX Runtime (Windows)
        if: matrix.ai_enabled == 'ON' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $ONNX_VERSION = "1.17.0"
          $ORT_NAME = "onnxruntime-win-x64-$ONNX_VERSION"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$ONNX_VERSION/$ORT_NAME.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\ort.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ort.zip" -DestinationPath "$env:RUNNER_TEMP"
          echo "ONNXRUNTIME_ROOT=$env:RUNNER_TEMP\$ORT_NAME" >> $env:GITHUB_ENV

      # ─── mbedTLS (when TLS=ON) ───
      - name: Download mbedTLS
        if: matrix.tls_enabled == 'ON'
        run: |
          curl -sL https://github.com/Mbed-TLS/mbedtls/releases/download/v3.6.0/mbedtls-3.6.0.tar.bz2 | tar xj -C third_party
          mv third_party/mbedtls-3.6.0 third_party/mbedtls

      # ─── Configure ───
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DNEUSTACK_ENABLE_AI=${{ matrix.ai_enabled }} \
            -DNEUSTACK_ENABLE_AF_XDP=${{ matrix.af_xdp }} \
            -DNEUSTACK_ENABLE_TLS=${{ matrix.tls_enabled }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DNEUSTACK_ENABLE_AI=${{ matrix.ai_enabled }} `
            -DCMAKE_PREFIX_PATH="${{ runner.temp }}/catch2-install"

      # ─── Build ───
      - name: Build
        run: cmake --build build

      # ─── Test ───
      - name: Test
        run: cd build && ctest --output-on-failure --timeout 60

  asan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build

      - name: Install Catch2 v3
        run: |
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git /tmp/catch2
          cmake -B /tmp/catch2/build -S /tmp/catch2 -G Ninja -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/catch2/build
          sudo cmake --install /tmp/catch2/build

      - name: Configure with ASan
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DNEUSTACK_ENABLE_ASAN=ON

      - name: Build
        run: cmake --build build

      - name: Test under ASan
        run: cd build && ctest --output-on-failure --timeout 120

  ubsan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build

      - name: Install Catch2 v3
        run: |
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git /tmp/catch2
          cmake -B /tmp/catch2/build -S /tmp/catch2 -G Ninja -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/catch2/build
          sudo cmake --install /tmp/catch2/build

      - name: Configure with UBSan
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DNEUSTACK_ENABLE_UBSAN=ON

      - name: Build
        run: cmake --build build

      - name: Test under UBSan
        run: cd build && ctest --output-on-failure --timeout 120

  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build

      - name: Install Catch2 v3
        run: |
          git clone --depth 1 --branch v3.5.2 https://github.com/catchorg/Catch2.git /tmp/catch2
          cmake -B /tmp/catch2/build -S /tmp/catch2 -G Ninja -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/catch2/build
          sudo cmake --install /tmp/catch2/build

      - name: Configure with benchmarks
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DNEUSTACK_BUILD_BENCHMARKS=ON

      - name: Build
        run: cmake --build build

      - name: Run benchmarks
        run: cd build && ctest -L benchmark --output-on-failure --timeout 120
