name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: neustack-linux-x64
            ort_platform: linux-x64
            ort_archive: onnxruntime-linux-x64
          - os: macos-latest
            artifact: neustack-macos-arm64
            ort_platform: osx-arm64
            ort_archive: onnxruntime-osx-arm64
          - os: windows-latest
            artifact: neustack-windows-x64
            ort_platform: ""
            ort_archive: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ─── Dependencies ───
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      # ─── ONNX Runtime (Linux/macOS only) ───
      - name: Install ONNX Runtime
        if: matrix.ort_platform != ''
        run: |
          ONNX_VERSION=1.17.0
          ORT_NAME="${{ matrix.ort_archive }}-${ONNX_VERSION}"
          curl -sL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNX_VERSION}/${ORT_NAME}.tgz" | tar xz -C /tmp
          # Copy to third_party for FindONNXRuntime.cmake
          mkdir -p third_party/onnxruntime/${{ matrix.ort_platform }}
          cp -r /tmp/${ORT_NAME}/* third_party/onnxruntime/${{ matrix.ort_platform }}/

      # ─── Build ───
      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          AI_FLAG=${{ matrix.ort_platform != '' && 'ON' || 'OFF' }}
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEUSTACK_ENABLE_AI=${AI_FLAG} \
            -DNEUSTACK_BUILD_TESTS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DNEUSTACK_ENABLE_AI=OFF `
            -DNEUSTACK_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build

      # ─── Package ───
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG=${{ github.ref_name }}
          PKG="${{ matrix.artifact }}-${TAG}"
          mkdir -p "${PKG}/lib" "${PKG}/include"
          cp build/libneustack_lib.a "${PKG}/lib/" 2>/dev/null || true
          cp -r include/neustack "${PKG}/include/"
          # Include ONNX models if present
          [ -d models ] && cp -r models "${PKG}/"
          tar czf "${PKG}.tar.gz" "${PKG}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $TAG = "${{ github.ref_name }}"
          $PKG = "${{ matrix.artifact }}-${TAG}"
          New-Item -ItemType Directory -Force -Path "${PKG}/lib", "${PKG}/include"
          Copy-Item "build/neustack_lib.lib" "${PKG}/lib/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "include/neustack" "${PKG}/include/"
          if (Test-Path "models") { Copy-Item -Recurse "models" "${PKG}/" }
          Compress-Archive -Path "${PKG}" -DestinationPath "${PKG}.zip"

      # ─── Upload artifact ───
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}-*.tar.gz
            ${{ matrix.artifact }}-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
